name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python scripts/check_public_boundary.py --tree HEAD
      - run: python scripts/check_public_boundary.py --history
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy
      - run: pytest
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_public_boundary.py --archives dist/*
      - run: python -m pip install --force-reinstall --no-deps dist/*.whl
      - run: >-
          python -c "from importlib import metadata, resources; import polyhorizon;
          assert metadata.version('polyhorizon-engineering') == polyhorizon.__version__;
          assert resources.files('polyhorizon').joinpath('py.typed').is_file()"
      - run: polyhorizon --help
      - run: python -m pip check
