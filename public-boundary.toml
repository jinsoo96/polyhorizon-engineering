version = 1

# This case-insensitive path policy is shared by local hooks, CI, history checks,
# and distribution-archive checks. A match is never eligible for publication.
deny = [
  ".claude",
  ".claude/**",
  "**/.claude",
  "**/.claude/**",
  ".codex",
  ".codex/**",
  "**/.codex",
  "**/.codex/**",
  ".polyhorizon",
  ".polyhorizon/**",
  "**/.polyhorizon",
  "**/.polyhorizon/**",
  ".ua",
  ".ua/**",
  "**/.ua",
  "**/.ua/**",
  ".understand-anything",
  ".understand-anything/**",
  "**/.understand-anything",
  "**/.understand-anything/**",
  ".env",
  ".env.*",
  ".envrc",
  "**/.env",
  "**/.env.*",
  "**/.envrc",
  "*.local.*",
  "**/*.local.*",
  "internal",
  "internal/**",
  "**/internal",
  "**/internal/**",
  "docs/internal",
  "docs/internal/**",
  "worklogs",
  "worklogs/**",
  "**/worklogs",
  "**/worklogs/**",
]
